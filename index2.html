<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện Apple</title>
    <style>
        /* --- CSS CƠ BẢN --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #1d1d1f;
        }

        /* Vùng 1: Thông báo */
        #vung1 {
            background-color: #f5f5f7;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            border-bottom: 1px solid #d2d2d7;
        }

        #vung1 button {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-left: 8px;
        }

        /* Vùng 2: Menu */
        #vung2 {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 15px 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        #vung2 a {
            text-decoration: none;
            color: #1d1d1f;
            font-size: 12px;
            opacity: 0.8;
            cursor: pointer;
        }

        /* Vùng 3: Tiêu đề */
        #vung3 {
            margin-top: 50px;
        }

        #vung3 h1 {
            font-size: 48px;
            margin-bottom: 0;
        }

        #vung3 p {
            font-size: 20px;
            margin-top: 10px;
        }

        /* --- VÙNG 4: THIẾT KẾ NÚT MỚI (ĐẸP & ĐƠN GIẢN) --- */
        #vung4 {
            margin-top: 25px;
            margin-bottom: 40px;
        }

        #vung4 a {
            display: inline-block;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 8px 20px; /* Tạo khoảng trống trong nút */
            border-radius: 20px; /* Bo tròn các góc */
            transition: all 0.3s ease;
            margin: 0 8px;
        }

        /* Nút Learn More - Kiểu viền mỏng tinh tế */
        #vung4 a:first-child {
            color: #0066cc;
            border: 1px solid #0066cc;
        }

        #vung4 a:first-child:hover {
            background-color: #0066cc;
            color: #ffffff;
        }

        /* Nút Buy - Kiểu màu nền đặc nổi bật */
        #vung4 a:last-child {
            background-color: #0071e3;
            color: #ffffff;
            border: 1px solid #0071e3;
        }

        #vung4 a:last-child:hover {
            background-color: #0077ed;
            border-color: #0077ed;
        }

        /* Vùng 5: Hình ảnh */
        #vung5 img {
            max-width: 90%;
            height: auto;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="vung1">
        <span>Chọn quốc gia hoặc khu vực khác để xem nội dung dành riêng cho vị trí của bạn...</span>
        <span><b>Việt Nam</b></span>
        <button>Tiếp tục</button>
    </div>

    <div id="vung2">
        <a>Store</a>
        <a>Mac</a>
        <a>iPad</a>
        <a>iPhone</a>
        <a>Watch</a>
        <a>Vision</a>
        <a>AirPods</a>
        <a>TV & Home</a>
        <a>Entertainment</a>
        <a>Accessories</a>
        <a>Support</a>
    </div>

    <div id="vung3">
        <center>
            <h1>MacBook Neo</h1>
            <p>Amazing Mac. Surprising price.</p>
        </center>
    </div>

    <div id="vung4">
        <center>
            <a>Learn more</a>
            <a>Buy</a>
        </center>
    </div>

    <div id="vung5">
        <center>
            <img src="https://cdn2.cellphones.com.vn/insecure/rs:fill:0:0/q:100/plain/https://cellphones.com.vn/media/wysiwyg/laptop/macbook/Neo/macbook-neo-8.jpg" alt="MacBook Neo" width="600">
        </center>
    </div>

</body>
</html>

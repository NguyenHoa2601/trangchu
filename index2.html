<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện Apple</title>
    <style>
        /* CSS Cơ bản theo phong cách tối giản */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #1d1d1f;
            line-height: 1.5;
        }

        /* Vùng 1: Thanh thông báo */
        #vung1 {
            background-color: #f5f5f7;
            padding: 12px 20px;
            text-align: center;
            font-size: 12px;
            color: #6e6e73;
            border-bottom: 1px solid #d2d2d7;
        }

        #vung1 b {
            color: #1d1d1f;
        }

        #vung1 button {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 8px;
            transition: background 0.3s;
        }

        #vung1 button:hover {
            background-color: #0077ed;
        }

        /* Vùng 2: Thanh Menu điều hướng */
        #vung2 {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 14px 0;
            background: rgba(251, 251, 253, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        #vung2 a {
            text-decoration: none;
            color: #1d1d1f;
            font-size: 12px;
            opacity: 0.8;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        #vung2 a:hover {
            opacity: 1;
            color: #0066cc;
        }

        /* Vùng 3 & 4: Nội dung giới thiệu */
        #vung3 {
            margin-top: 60px;
        }

        #vung3 h1 {
            font-size: 56px;
            font-weight: 600;
            letter-spacing: -0.005em;
            margin-bottom: 0;
        }

        #vung3 p {
            font-size: 24px;
            margin-top: 10px;
            font-weight: 400;
        }

        #vung4 {
            margin-top: 15px;
            margin-bottom: 40px;
        }

        #vung4 a {
            color: #0066cc;
            text-decoration: none;
            font-size: 19px;
            margin: 0 15px;
            display: inline-block;
        }

        #vung4 a:after {
            content: " >";
            font-size: 14px;
        }

        #vung4 a:hover {
            text-decoration: underline;
        }

        /* Vùng 5: Hình ảnh sản phẩm */
        #vung5 img {
            max-width: 800px;
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 50px;
        }

        /* Căn giữa bổ sung */
        center {
            display: block;
        }
    </style>
</head>
<body>

    <div id="vung1">
        <span>Chọn quốc gia hoặc khu vực khác để xem nội dung dành riêng cho vị trí của bạn...</span>
        <span><b>Việt Nam</b></span>
        <button>Tiếp tục</button>
    </div>

    <div id="vung2">
        <a>Store</a>
        <a>Mac</a>
        <a>iPad</a>
        <a>iPhone</a>
        <a>Watch</a>
        <a>Vision</a>
        <a>AirPods</a>
        <a>TV & Home</a>
        <a>Entertainment</a>
        <a>Accessories</a>
        <a>Support</a>
    </div>
    
    <div id="vung3">
        <center>
            <h1>MacBook Neo</h1>
            <p>Amazing Mac. Surprising price.</p>
        </center>
    </div>

    <div id="vung4">
        <center>
            <a>Learn more</a>
            <a>Buy</a>
        </center>
    </div>

    <div id="vung5">
        <center>
            <img src="https://cdn2.cellphones.com.vn/insecure/rs:fill:0:0/q:100/plain/https://cellphones.com.vn/media/wysiwyg/laptop/macbook/Neo/macbook-neo-8.jpg" alt="MacBook Neo" width="600">
        </center>
    </div>

</body>
</html>

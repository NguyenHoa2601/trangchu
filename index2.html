        /* CSS Cơ bản theo phong cách tối giản */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #1d1d1f;
            line-height: 1.5;

        /* Vùng 1: Thanh thông báo */
        #vung1 {
            background-color: #f5f5f7;
            padding: 12px 20px;
            text-align: center;
            font-size: 12px;
            color: #6e6e73;
            border-bottom: 1px solid #d2d2d7;
        }

        #vung1 b {
            color: #1d1d1f;
        }

        #vung1 button {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 8px;
            transition: background 0.3s;
        }

        #vung1 button:hover {
            background-color: #0077ed;
        }

        #vung2 {

            align-items: center;

            background: rgba(251, 251, 253, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        #vung2 a {
            text-decoration: none;
            color: #1d1d1f;
            font-size: 12px;
            opacity: 0.8;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        #vung2 a:hover {
            opacity: 1;
            color: #0066cc;
        }

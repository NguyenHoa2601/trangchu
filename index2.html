<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện Apple - MacBook Neo</title>
    <style>
        /* 1. Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1d1d1f;
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. Vùng 1: Banner thông báo */
        #vung1 {
            background-color: #f5f5f7;
            padding: 12px 20px;
            text-align: center;
            font-size: 12px;
            color: #1d1d1f;
        }

        #vung1 b {
            font-weight: 600;
            margin-left: 4px;
        }

        #vung1 button {
            background: none;
            border: none;
            color: #0066cc;
            cursor: pointer;
            margin-left: 10px;
            font-size: 12px;
            padding: 0;
        }

        #vung1 button:hover {
            text-decoration: underline;
        }

        /* 3. Vùng 2: Navigation - Sticky & Glassmorphism */
        #vung2 {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            height: 44px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            position: sticky;
            top: 0;
            z-index: 9999;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        #vung2 a {
            text-decoration: none;
            color: #1d1d1f;
            font-size: 12px;
            opacity: 0.8;
            transition: opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            cursor: pointer;
            font-weight: 400;
        }

        #vung2 a:hover {
            opacity: 1;
            color: #0066cc;
        }

        /* 4. Vùng 3: Headline Typography */
        #vung3 {
            padding-top: 80px;
            text-align: center;
        }

        #vung3 h1 {
            font-size: 56px;
            line-height: 1.07143;
            font-weight: 600;
            letter-spacing: -0.005em;
            margin-bottom: 6px;
        }

        #vung3 p {
            font-size: 24px;
            line-height: 1.16667;
            font-weight: 400;
            letter-spacing: .009em;
            color: #1d1d1f;
        }

        /* 5. Vùng 4: Buttons (Pill-shaped) */
        #vung4 {
            margin-top: 15px;
            margin-bottom: 50px;
            text-align: center;
        }

        #vung4 a {
            display: inline-block;
            padding: 8px 16px;
            font-size: 17px;
            line-height: 1.17648;
            font-weight: 400;
            letter-spacing: -0.022em;
            border-radius: 980px;
            text-decoration: none;
            margin: 0 10px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* Nút Learn more (Dạng Solid Blue) */
        #vung4 a:first-child {
            background-color: #0066cc;
            color: #fff;
            border: 1px solid #0066cc;
        }

        #vung4 a:first-child:hover {
            background-color: #0071e3;
            border-color: #0071e3;
        }

        /* Nút Buy (Dạng Outline Blue) */
        #vung4 a:last-child {
            background-color: transparent;
            color: #0066cc;
            border: 1px solid #0066cc;
        }

        #vung4 a:last-child:hover {
            background-color: #0066cc;
            color: #fff;
        }

        /* 6. Vùng 5: Image centering & Responsive */
        #vung5 {
            text-align: center;
            padding-bottom: 100px;
            max-width: 1000px;
            margin: 0 auto;
        }

        #vung5 img {
            max-width: 90%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 12px; /* Thêm bo nhẹ cho ảnh hiện đại hơn */
        }

        /* Responsive cho Mobile */
        @media (max-width: 734px) {
            #vung3 h1 { font-size: 40px; }
            #vung3 p { font-size: 19px; }
            #vung2 { gap: 15px; overflow-x: auto; justify-content: flex-start; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div id="vung1">
        <span>Chọn quốc gia hoặc khu vực khác để xem nội dung dành riêng cho vị trí của bạn...</span>
        <span><b>Việt Nam</b></span>
        <button>Tiếp tục</button>
    </div>

    <div id="vung2">
        <a>Store</a>
        <a>Mac</a>
        <a>iPad</a>
        <a>iPhone</a>
        <a>Watch</a>
        <a>Vision</a>
        <a>AirPods</a>
        <a>TV & Home</a>
        <a>Entertainment</a>
        <a>Accessories</a>
        <a>Support</a>
    </div>

    <div id="vung3">
        <center>
            <h1>MacBook Neo</h1>
            <p>Amazing Mac. Surprising price.</p>
        </center>
    </div>

    <div id="vung4">
        <center>
            <a>Learn more</a>
            <a>Buy</a>
        </center>
    </div>

    <div id="vung5">
        <center>
            <img src="https://cdn2.cellphones.com.vn/insecure/rs:fill:0:0/q:100/plain/https://cellphones.com.vn/media/wysiwyg/laptop/macbook/Neo/macbook-neo-8.jpg" alt="MacBook Neo">
        </center>
    </div>

</body>
</html>
